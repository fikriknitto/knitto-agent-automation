services:
  appium:
    build:
      context: ./docker/appium
      dockerfile: Dockerfile
    container_name: knitto-appium
    restart: unless-stopped
    ports:
      - "${APPIUM_PORT:-4723}:4723"
    environment:
      ANDROID_HOME: /usr/lib/android-sdk
      ANDROID_SDK_ROOT: /usr/lib/android-sdk
      PATH: /usr/lib/android-sdk/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Emulator/BlueStacks di host — Appium pakai adb connect (bukan ADB_SERVER_SOCKET).
      # Multi-instance: host.docker.internal:5555,host.docker.internal:5556
      ADB_CONNECT_TARGETS: ${ADB_CONNECT_TARGETS:-host.docker.internal:5555}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4723/status"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: knitto-backend
    restart: unless-stopped
    env_file:
      - docker.env
    environment:
      # Agent API keys come from Web UI over WebSocket (not Compose env).
      # Appium service di Compose (bukan Appium di host)
      APPIUM_SERVER_URL: ${APPIUM_SERVER_URL:-http://appium:4723}
      ADB_SERVER_SOCKET: ${ADB_SERVER_SOCKET:-tcp:host.docker.internal:5037}
      BACKEND_PORT: ${BACKEND_PORT:-3080}
    ports:
      - "${BACKEND_PORT:-3080}:3080"
    volumes:
      - knitto-storage:/app/storage
      - knitto-screenshoot:/app/screenshoot
      - ./memory:/app/memory
      - ./prompt-shortcuts:/app/prompt-shortcuts
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      appium:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: knitto-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  knitto-storage:
  knitto-screenshoot:
